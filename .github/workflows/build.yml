name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: windows_dll_compat_checker-linux-x86_64
            binary: windows_dll_compat_checker
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: windows_dll_compat_checker-linux-arm64
            binary: windows_dll_compat_checker
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: windows_dll_compat_checker-windows-x86_64
            binary: windows_dll_compat_checker.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: windows_dll_compat_checker-windows-arm64
            binary: windows_dll_compat_checker.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: windows_dll_compat_checker-macos-arm64
            binary: windows_dll_compat_checker

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: zip -j ${{ matrix.artifact }}.zip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} .
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
