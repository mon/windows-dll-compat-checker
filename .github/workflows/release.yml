name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0)'
        required: true
      title:
        description: 'Release title (defaults to tag)'
      prerelease:
        type: boolean
        default: false
      create_release:
        description: 'Set false to re-upload assets to an existing tag'
        type: boolean
        default: true

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8

      - name: Collect artifacts
        run: mv */*.zip */*.tar.xz .

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          if ${{ inputs.prerelease }}; then PRERELEASE="--prerelease"; fi
          TITLE="${{ inputs.title || inputs.tag }}"
          ASSETS=(*.zip *.tar.xz)
          if ${{ inputs.create_release }}; then
            gh release create ${{ inputs.tag }} $PRERELEASE \
              --title "$TITLE" --notes "" \
              "${ASSETS[@]}" \
              -R ${{ github.repository }}
          else
            gh release upload ${{ inputs.tag }} \
              "${ASSETS[@]}" --clobber \
              -R ${{ github.repository }}
          fi
